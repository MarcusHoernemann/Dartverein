<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DC Issso Spielbericht</title>

    <link rel="manifest" href="/Dartverein/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/Dartverein/icon.png">
    <link rel="apple-touch-icon" href="/Dartverein/icon.png">
    
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DC Issso">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        :root {
            --primary: #85c1e9; --secondary: #7f8c8d; --accent: #3498db; --bg: #121212;
            --container-bg: #1e1e1e; --text: #e0e0e0; --border: #444; --input-bg: #2a2a2a;
        }
        body { font-family: sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 900px; margin: 0 auto; background: var(--container-bg); padding: 20px; border-radius: 12px; }
        h1, h2 { color: var(--primary); border-bottom: 2px solid var(--border); padding-bottom: 5px; }
        .install-btn { display: none; background-color: #27ae60; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 20px; font-weight: bold; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 10px; }
        label { font-weight: 600; color: var(--secondary); font-size: 0.9em; }
        input, select, textarea { padding: 10px; border: 1px solid var(--border); border-radius: 6px; background-color: var(--input-bg); color: var(--text); width: 100%; box-sizing: border-box; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .player-grid { display: grid; grid-template-columns: 90px 1fr 1fr; gap: 8px; align-items: center; margin-top: 10px; }
        .block-container { border: 2px solid var(--border); border-radius: 8px; margin-bottom: 25px; }
        .block-title { background-color: #2c3e50; color: white; padding: 10px; font-weight: bold; }
        .match-row { display: grid; grid-template-columns: 50px 1fr 1fr 1fr 1fr; gap: 10px; padding: 10px; border-bottom: 1px solid var(--border); align-items: center; }
        .set-box { width: 30px; height: 30px; border: 2px solid var(--border); border-radius: 6px; background-color: var(--input-bg); cursor: pointer; }
        .set-box.active { background-color: #2ecc71; }
        .submit-btn { background-color: var(--accent); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; margin-top: 20px; font-weight: bold; }
        .fab { position: fixed; bottom: 25px; right: 25px; background-color: #2644cc; color: white; border-radius: 50%; width: 65px; height: 65px; cursor: pointer; z-index: 1000; border: none; font-size: 30px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1001; justify-content: center; align-items: center; }
        .modal-content { background: var(--container-bg); padding: 25px; border-radius: 12px; width: 90%; max-width: 400px; }
        .counter-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid var(--border); }
        .counter-btn { width: 40px; height: 40px; border-radius: 8px; border: none; background: var(--accent); color: white; font-weight: bold; }
        .status-msg { margin-top: 15px; padding: 10px; text-align: center; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>DC Issso Spielbericht</h1>
    <button id="installAppBtn" class="install-btn">📱 App installieren</button>
    <form id="dartForm">
        <div class="form-group"><label>Mannschaft:</label><div style="display:flex; gap:10px;"><label><input type="radio" name="teamRolle" value="Heim" checked> Heim</label><label><input type="radio" name="teamRolle" value="Gast"> Gast</label></div></div>
        <div class="form-group"><label>Strafe pro Fehlwurf (€):</label><input type="number" id="strafeWert" step="0.01" value="0.20"></div>
        <div class="grid-2">
            <div><label>Heim-Team</label><input type="text" id="heimTeam" required></div>
            <div><label>Gast-Team</label><input type="text" id="gastTeam" required></div>
        </div>
        <div class="grid-2">
            <div><label>Kapitän Heim</label><div id="kapitaenHeimContainer"><input type="text" id="kapitaenHeim"></div></div>
            <div><label>Kapitän Gast</label><div id="kapitaenGastContainer"><input type="text" id="kapitaenGast"></div></div>
        </div>
        <div class="grid-2">
            <div id="heimRoster" class="player-grid"></div>
            <div id="gastRoster" class="player-grid"></div>
        </div>
        <h2>Spielplan</h2>
        <div id="matchesContainer"></div>
        <button type="submit" id="submitBtn" class="submit-btn">Spielbericht speichern</button>
        <div id="statusMessage" class="status-msg"></div>
    </form>
</div>

<button type="button" class="fab" id="openModalBtn">⚫</button>
<div id="blackRingModal" class="modal">
    <div class="modal-content">
        <h2>Lakritz Zähler</h2>
        <div id="blackRingList"></div>
        <button type="button" class="submit-btn" id="closeModalBtn">Fertig</button>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzAVipJcjV8aoF6XtKh8-V6Woq8PbVYRTQAKsjin4R-ChIx2UKKj0959hkAFRVrJSzQ/exec";
    const MEIN_VEREIN = "DC Issso";
    const unsereSpieler = ["Angelo", "Carsten", "Jens", "Marcus", "Marvin", "Philipp", "Volker", "Spieler 8", "Spieler 9", "Spieler 10"];
    const unsereKapitaene = ["Jens", "Marcus"];
    let penalties = { h: [0,0,0,0,0,0], g: [0,0,0,0,0,0] };

    // Initialisierung
    document.addEventListener('DOMContentLoaded', () => {
        updateTeamNameAuto();
        generateMatches();
    });

    function generateMatches() {
        const container = document.getElementById('matchesContainer');
        for(let i=1; i<=16; i++) {
            const row = document.createElement('div');
            row.className = 'match-row';
            row.innerHTML = `<div>#${i}</div><div>H${(i-1)%4+1}</div><div>G${(i-1)%4+1}</div><div class="set-controls" id="heim-sets-${i}"><div class="set-box"></div><div class="set-box"></div></div><div class="set-controls" id="gast-sets-${i}"><div class="set-box"></div><div class="set-box"></div></div>`;
            container.appendChild(row);
        }
        container.addEventListener('click', (e) => { if(e.target.classList.contains('set-box')) e.target.classList.toggle('active'); });
    }

    function buildCaptain(prefix, isIsso) {
        const container = document.getElementById(prefix === 'h' ? 'kapitaenHeimContainer' : 'kapitaenGastContainer');
        const oldVal = document.getElementById(prefix === 'h' ? 'kapitaenHeim' : 'kapitaenGast').value;
        if (isIsso) {
            let options = `<select id="${prefix === 'h' ? 'kapitaenHeim' : 'kapitaenGast'}">`;
            unsereKapitaene.forEach(k => options += `<option value="${k}" ${oldVal===k?'selected':''}>${k}</option>`);
            container.innerHTML = options + `</select>`;
        } else {
            container.innerHTML = `<input type="text" id="${prefix === 'h' ? 'kapitaenHeim' : 'kapitaenGast'}" value="${oldVal}">`;
        }
    }

    function buildRoster(prefix, isIsso) {
        const roster = document.getElementById(prefix === 'h' ? 'heimRoster' : 'gastRoster');
        roster.innerHTML = `<div>Pos.</div><div>Name</div><div>Pass</div>`;
        for(let i=1; i<=6; i++) {
            let nameInput = isIsso ? `<select class="player-name-${prefix}" data-idx="${i}">` + unsereSpieler.map(s => `<option value="${s}">${s}</option>`).join('') + `</select>` : `<input type="text" class="player-name-${prefix}" data-idx="${i}">`;
            roster.innerHTML += `<div>${prefix.toUpperCase()}${i}</div><div>${nameInput}</div><div><input type="text" class="player-pass-${prefix}" data-idx="${i}"></div>`;
        }
    }

    function updateTeamNameAuto() {
        const isHeim = document.querySelector('input[name="teamRolle"]:checked').value === 'Heim';
        document.getElementById('heimTeam').value = isHeim ? MEIN_VEREIN : '';
        document.getElementById('gastTeam').value = !isHeim ? MEIN_VEREIN : '';
        buildCaptain('h', isHeim); buildCaptain('g', !isHeim);
        buildRoster('h', isHeim); buildRoster('g', !isHeim);
    }
    document.querySelectorAll('input[name="teamRolle"]').forEach(r => r.addEventListener('change', updateTeamNameAuto));

    const openModalBtn = document.getElementById('openModalBtn');
    openModalBtn.addEventListener('click', () => {
        document.getElementById('blackRingList').innerHTML = '';
        const isHeim = document.querySelector('input[name="teamRolle"]:checked').value === 'Heim';
        const prefix = isHeim ? 'h' : 'g';
        for(let i=1; i<=6; i++) {
            const row = document.createElement('div');
            row.className = 'counter-row';
            row.innerHTML = `<span>${prefix.toUpperCase()}${i}</span><div><button type="button" class="counter-btn" onclick="updateCount('${prefix}', ${i-1}, -1)">-</button><span id="count-${prefix}-${i-1}">${penalties[prefix][i-1]}</span><button type="button" class="counter-btn" onclick="updateCount('${prefix}', ${i-1}, 1)">+</button></div>`;
            document.getElementById('blackRingList').appendChild(row);
        }
        document.getElementById('blackRingModal').style.display = 'flex';
    });
    document.getElementById('closeModalBtn').addEventListener('click', () => document.getElementById('blackRingModal').style.display = 'none');
    window.updateCount = (p, i, c) => { penalties[p][i] = Math.max(0, penalties[p][i] + c); document.getElementById(`count-${p}-${i}`).textContent = penalties[p][i]; };

    document.getElementById('dartForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        alert("Daten gesendet!");
    });

    window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; document.getElementById('installAppBtn').style.display = 'block'; });
    let deferredPrompt;
    document.getElementById('installAppBtn').addEventListener('click', () => { if(deferredPrompt) deferredPrompt.prompt(); });

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/Dartverein/sw.js');
</script>
</body>
</html>
