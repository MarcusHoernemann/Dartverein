<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DC Issso Spielbericht</title>

    <!-- PWA & Homescreen Icons - Strenge relative Pfade für GitHub Pages -->
    <link rel="manifest" href="manifest.json?v=5">
    <link rel="icon" type="image/png" sizes="192x192" href="logo.png?v=5">
    <link rel="apple-touch-icon" href="logo.png?v=5">
    <link rel="apple-touch-icon" sizes="152x152" href="logo.png?v=5">
    <link rel="apple-touch-icon" sizes="180x180" href="logo.png?v=5">
    <link rel="apple-touch-icon" sizes="192x192" href="logo.png?v=5">
    
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DC Issso">
    <meta name="mobile-web-app-capable" content="yes">

<!--########## CSS Design ##########-->    

    <style>
        :root {
            --primary: #85c1e9;
            --secondary: #7f8c8d;
            --accent: #3498db;
            --bg: #121212;
            --container-bg: #1e1e1e;
            --text: #e0e0e0;
            --border: #444;
            --danger: #e74c3c;
            --input-bg: #2a2a2a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            line-height: 1.5;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--container-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            position: relative;
        }

        h1, h2, h3 {
            color: var(--primary);
            border-bottom: 2px solid var(--border);
            padding-bottom: 5px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 10px;
        }

        label {
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.9em;
            color: var(--secondary);
        }

        input[type="text"],
        input[type="number"],
        input[type="date"],
        textarea,
        select {
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 16px; 
            background-color: var(--input-bg);
            color: var(--text);
            transition: border-color 0.3s;
            box-sizing: border-box;
            width: 100%;
        }

        /* Fix für Dropdown-Optionen (Auswahlliste) im Darkmode */
        select option {
            background-color: var(--input-bg);
            color: var(--text);
        }

        input[readonly] {
            background-color: #222;
            color: #7f8fa6;
            cursor: not-allowed;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .player-grid {
            display: grid;
            grid-template-columns: 90px 1fr 1fr;
            gap: 8px;
            align-items: center;
            margin-top: 10px;
        }

        .player-grid div {
            font-size: 0.9em;
        }

        .ersatz-bg {
            background-color: #111111 !important; 
            color: #888888 !important;
            border: 1px dashed #555555 !important;
        }

        .block-container {
            border: 2px solid var(--border);
            border-radius: 8px;
            margin-bottom: 25px;
            overflow: hidden;
            background: var(--container-bg);
        }

        .block-title {
            background-color: #2c3e50;
            color: white;
            padding: 10px 15px;
            font-weight: bold;
            font-size: 1.1em;
        }

        .match-row {
            display: grid;
            grid-template-columns: 50px 1fr 1fr 1fr 1fr;
            gap: 10px;
            align-items: center;
            padding: 10px 15px;
            border-bottom: 1px solid var(--border);
        }

        .match-row:nth-child(even) {
            background-color: #252525;
        }

        .match-header {
            font-weight: bold;
            background-color: #1f2d3d;
            color: white;
        }

        .dynamic-player {
            font-weight: bold;
            color: var(--accent);
        }

        .player-name-display {
            font-size: 0.5em; 
            font-weight: normal; 
            margin-left: 4px;
            color: var(--secondary);
            vertical-align: middle;
        }

        .set-controls {
            display: inline-flex;
            gap: 8px;
            vertical-align: middle;
        }

        .set-box {
            width: 30px;
            height: 30px;
            border: 2px solid var(--border);
            border-radius: 6px;
            background-color: var(--input-bg);
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }

        .set-box.active {
            background-color: #2ecc71;
            border-color: #27ae60;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
        }

        .sub-row {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 15px;
            background-color: #1a252f;
        }

        .sub-group {
            display: flex;
            flex-direction: column;
        }

        .sub-group label {
            font-size: 0.85em;
            margin-bottom: 5px;
            color: var(--primary);
            font-weight: bold;
        }
        
        .sub-twin-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .compact-sub {
            display: flex;
            align-items: center;
            background: var(--container-bg);
            padding: 2px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .compact-sub select {
            padding: 6px;
            font-size: 14px;
            border: none;
            background: transparent;
            color: var(--text);
            width: 100%;
            margin: 0;
            box-shadow: none;
        }

        .compact-sub select:focus {
            outline: none;
            box-shadow: none;
        }

        .compact-sub span {
            font-size: 12px;
            padding: 0 4px;
            color: var(--secondary);
        }

        button.submit-btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 15px 20px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        button.submit-btn:hover {
            background-color: #2980b9;
        }

        button.submit-btn:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
        }

        .status-msg {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            display: none;
        }

        .success { background-color: #1e4620; color: #81c784; }
        .error { background-color: #4a1c1e; color: #e57373; }

        .settings-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            background-color: #252525; 
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-bottom: 15px;
            font-size: 10px; 
            color: var(--text); 
        }

        .settings-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .settings-group label {
            margin-bottom: 0;
            color: var(--text); 
            font-weight: normal;
            font-size: 10px; 
        }

        .settings-group .radio-label {
            font-weight: normal;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .settings-group input[type="radio"] {
            width: auto;
            margin: 0;
            transform: scale(0.8);
        }

        .settings-group input[type="number"] {
            width: 45px;
            padding: 2px 4px;
            font-size: 10px;
            height: auto;
            border: 1px solid var(--border);
            background-color: var(--input-bg);
            color: var(--text); 
            border-radius: 4px;
            -moz-appearance: textfield; 
        }

        .settings-group input[type="number"]::-webkit-outer-spin-button,
        .settings-group input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .result-container {
            background: #252525;
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .result-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .result-row:last-child {
            margin-bottom: 0;
        }

        .result-label {
            font-weight: 600;
            min-width: 130px;
            color: var(--primary);
        }

        .result-row label {
            margin-bottom: 0;
            font-size: 0.9em;
            color: var(--secondary);
        }

        .result-row input {
            width: 60px;
            padding: 6px;
            font-size: 16px;
            text-align: center;
            font-weight: bold;
        }

        .fab {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background-color: #2644cc;
            color: white;
            border: 2px solid white;
            border-radius: 50%;
            width: 65px;
            height: 65px;
            font-size: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            cursor: pointer;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s;
        }

        .fab:active {
            transform: scale(0.95);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1001;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(3px);
        }

        .modal-content {
            background: var(--container-bg);
            padding: 25px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .counter-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .counter-name {
            font-weight: 600;
            font-size: 1.1em;
            color: var(--primary);
            flex-grow: 1;
        }

        .counter-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .counter-btn {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: none;
            background: var(--accent);
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.2s;
        }
        
        .counter-btn.minus {
            background: var(--secondary);
        }

        .counter-val {
            font-weight: bold;
            font-size: 1.2em;
            width: 25px;
            text-align: center;
        }

        .modal-close {
            margin-top: 20px;
            background-color: var(--secondary);
            color: white;
        }
        .modal-close:hover {
            background-color: #5d6d7e;
        }

        .copyright {
            text-align: center;
            margin-top: 25px;
            padding-top: 15px;
            font-size: 0.85em;
            color: var(--secondary);
            border-top: 1px solid var(--border);
        }

        @media (max-width: 600px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
            .match-row {
                grid-template-columns: 1fr;
                gap: 5px;
                padding: 15px 10px;
            }
            .match-header {
                display: none;
            }
            .mobile-label {
                display: inline-block;
                width: 90px;
                font-weight: bold;
            }
            .result-row {
                flex-wrap: wrap;
            }
            .result-label {
                width: 100%;
                margin-bottom: 5px;
            }
            .sub-twin-container {
                grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            }
            .settings-bar {
                flex-direction: row;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>DC Issso Spielbericht</h1>
    
    <form id="dartForm">
        
        <div class="settings-bar">
            <div class="settings-group">
                <label>Mannschaft:</label>
                <label class="radio-label"><input type="radio" name="teamRolle" value="Heim" checked> Heim</label>
                <label class="radio-label"><input type="radio" name="teamRolle" value="Gast"> Gast</label>
            </div>
            <div class="settings-group">
                <label for="strafeWert">Strafe pro Fehlwurf (€):</label>
                <input type="number" id="strafeWert" step="0.01" value="0.20" min="0">
            </div>
        </div>

        <div class="grid-4">
            <div class="form-group">
                <label>Datum</label>
                <input type="date" id="datum" required>
            </div>
            <div class="form-group">
                <label>Liga-Gruppe</label>
                <input type="text" id="liga">
            </div>
            <div class="form-group">
                <label>Spielnr.</label>
                <input type="text" id="spielnr">
            </div>
            <div class="form-group">
                <label>Disziplin</label>
                <select id="disziplin">
                    <option value="301 Single out">301 Single out</option>
                    <option value="301 Master out">301 Master out</option>
                    <option value="501 Master out">501 Master out</option>
                    <option value="501 Double out">501 Double out</option>
                </select>
            </div>
        </div>

<!--########## Mannschaftsaufstellung ##########-->

        <h2>Mannschaftsaufstellung</h2>
        <div class="grid-2">
            <div>
                <div class="form-group">
                    <label>Heim-Team (Teamname)</label>
                    <input type="text" id="heimTeam" required>
                </div>
                <div class="form-group">
                    <label>Teamkapitän (Heim)</label>
                    <div id="kapitaenHeimContainer"><input type="text" id="kapitaenHeim"></div>
                </div>
                <div class="player-grid" id="heimRoster">
                    <!-- Wird dynamisch durch JS befüllt -->
                </div>
            </div>

            <div>
                <div class="form-group">
                    <label>Gast-Team (Teamname)</label>
                    <input type="text" id="gastTeam" required>
                </div>
                <div class="form-group">
                    <label>Teamkapitän (Gast)</label>
                    <div id="kapitaenGastContainer"><input type="text" id="kapitaenGast"></div>
                </div>
                <div class="player-grid" id="gastRoster">
                    <!-- Wird dynamisch durch JS befüllt -->
                </div>
            </div>
        </div>

<!--########## Spielergebnis ##########-->

        <h2>Spielplan</h2>
        <div id="matchesContainer">
        </div>

        <h2>Endergebnis & Gewinnsätze</h2>
        <div class="result-container">
            <div class="result-row">
                <span class="result-label">Spielergebnis:</span>
                <label>Heim</label> <input type="number" id="spielergebnisHeim" readonly placeholder="0">
                <label>Gast</label> <input type="number" id="spielergebnisGast" readonly placeholder="0">
            </div>
            <div class="result-row">
                <span class="result-label">Gewinnsätze:</span>
                <label>Heim</label> <input type="number" id="gewinnsaetzeHeim" readonly placeholder="0">
                <label>Gast</label> <input type="number" id="gewinnsaetzeGast" readonly placeholder="0">
            </div>
        </div>

<!--########## Bestleistungen ##########-->

        <h2>Bestleistungen</h2>
        <div>
            <div class="form-group">
                <label>High Score (180, 171, 162,153, immer nur das gleiche Triple Segment. Bull Eye 3x)</label>
                <input type="text" id="highScore">
            </div>
            <div class="form-group">
                <label>High Finish (ab 100)</label>
                <input type="text" id="highFinish">
            </div>
            <div class="form-group">
                <label>Short Game (301 bis 12 Darts / 501 bis 18 Darts)</label>
                <input type="text" id="shortGame">
            </div>
            <div class="form-group">
                <label>Bull Eye Check</label>
                <input type="text" id="bullEye">
            </div>
        </div>

<!--########## Bemerkungen ##########-->

        <h2>Bemerkungen</h2>
        <div class="form-group">
            <textarea id="bemerkungen" rows="3"></textarea>
        </div>

        <button type="submit" id="submitBtn" class="submit-btn">Spielbericht speichern</button>
        <div id="statusMessage" class="status-msg"></div>
    </form>
    
    <div class="copyright">&copy; 2026 Marcus Hörnemann 1.3.8</div>
</div>

<!--########## Lakritz Zähler Button ##########-->

<button type="button" class="fab" id="openModalBtn">⚫</button>

<div id="blackRingModal" class="modal">
    <div class="modal-content">
        <h2 style="margin-top: 0; font-size: 1.5em; border-bottom: none;">Lakritz Zähler</h2>
        <p style="font-size: 0.9em; color: var(--secondary); margin-top: -10px;">Strafkasse: <span id="currentPenaltyDisplay">0,20</span> € / Wurf</p>
        <div id="blackRingList">
        </div>
        <button type="button" class="submit-btn modal-close" id="closeModalBtn">Fertig</button>
    </div>
</div>

<script>
// ###############################################################################################
// ######################################## KONFIGURATION ########################################
// ###############################################################################################
    
    // --- Google Tabelle URL ---
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzAVipJcjV8aoF6XtKh8-V6Woq8PbVYRTQAKsjin4R-ChIx2UKKj0959hkAFRVrJSzQ/exec";
    // --- Vereinsname ---
    const MEIN_VEREIN = "DC Issso";
    // --- Spielernamen ---
    const unsereSpieler = [
        "Angelo", "Carsten", "Jens", "Marcus", "Marvin",
        "Philipp", "Volker", "Spieler 8", "Spieler 9", "Spieler 10"
    ];
    // --- Namen erster und zweiter TC ---
    const unsereKapitaene = ["Jens", "Marcus"];

    // --- Straf-Feld Formatierung auf 2 Nachkommastellen ---
    const strafeInput = document.getElementById('strafeWert');
    strafeInput.addEventListener('blur', function() {
        if(this.value) {
            let val = parseFloat(this.value.toString().replace(',', '.'));
            if (!isNaN(val)) {
                this.value = val.toFixed(2);
                document.getElementById('currentPenaltyDisplay').textContent = val.toFixed(2).replace('.', ',');
            }
        }
    });

    // --- Dynamische Roster- & Kapitän-Generierung ---
    function buildCaptain(prefix, isIsso) {
        const container = document.getElementById(prefix === 'h' ? 'kapitaenHeimContainer' : 'kapitaenGastContainer');
        const oldInput = document.getElementById(prefix === 'h' ? 'kapitaenHeim' : 'kapitaenGast');
        const oldVal = oldInput ? oldInput.value : '';

        if (isIsso) {
            let options = `<option value="">Bitte wählen...</option>`;
            unsereKapitaene.forEach(k => {
                let selected = (oldVal === k) ? 'selected' : '';
                options += `<option value="${k}" ${selected}>${k}</option>`;
            });
            container.innerHTML = `<select id="${prefix === 'h' ? 'kapitaenHeim' : 'kapitaenGast'}">${options}</select>`;
        } else {
            container.innerHTML = `<input type="text" id="${prefix === 'h' ? 'kapitaenHeim' : 'kapitaenGast'}" value="${oldVal}">`;
        }
    }

    function buildRoster(prefix, isIsso) {
        const roster = document.getElementById(prefix === 'h' ? 'heimRoster' : 'gastRoster');
        
        const oldNames = {};
        const oldPasses = {};
        for(let i=1; i<=6; i++) {
            let el = document.querySelector(`.player-name-${prefix}[data-idx="${i}"]`);
            if(el) oldNames[i] = el.value;
            let passEl = document.querySelector(`.player-pass-${prefix}[data-idx="${i}"]`);
            if(passEl) oldPasses[i] = passEl.value;
        }

        roster.innerHTML = `<div><strong>Pos.</strong></div><div><strong>Spielername</strong></div><div><strong>Passnr.</strong></div>`;

        for (let i = 1; i <= 6; i++) {
            const label = i > 4 ? `${prefix.toUpperCase()}${i} (Ersatz)` : `${prefix.toUpperCase()}${i}`;
            const bgClass = i > 4 ? 'ersatz-bg' : '';

            let nameInput = '';
            if (isIsso) {
                let options = `<option value="">Bitte wählen...</option>`;
                unsereSpieler.forEach(sp => {
                    let selected = (oldNames[i] === sp) ? 'selected' : '';
                    options += `<option value="${sp}" ${selected}>${sp}</option>`;
                });
                nameInput = `<select class="player-name-${prefix} ${bgClass}" data-idx="${i}">${options}</select>`;
            } else {
                let val = oldNames[i] || '';
                nameInput = `<input type="text" class="player-name-${prefix} ${bgClass}" data-idx="${i}" value="${val}">`;
            }

            let passVal = oldPasses[i] || '';
            let passInput = `<input type="text" class="player-pass-${prefix} ${bgClass}" data-idx="${i}" value="${passVal}">`;

            roster.innerHTML += `
                <div><strong>${label}</strong></div>
                <div>${nameInput}</div>
                <div>${passInput}</div>
            `;
        }
    }

    const basePairings = [
        [1,1], [2,2], [3,3], [4,4], // Block 1
        [1,2], [2,4], [3,1], [4,3], // Block 2
        [1,3], [2,1], [3,4], [4,2], // Block 3
        [1,4], [2,3], [3,2], [4,1]  // Block 4
    ];

    const matchesContainer = document.getElementById('matchesContainer');
    let currentBlock = null;

    basePairings.forEach((paarung, index) => {
        const gameNr = index + 1;
        const blockNr = Math.ceil(gameNr / 4);

        if (gameNr % 4 === 1) {
            currentBlock = document.createElement('div');
            currentBlock.className = 'block-container';
            currentBlock.innerHTML = `
                <div class="block-title">Block ${blockNr}</div>
                <div class="match-row match-header">
                    <div>Spiel</div>
                    <div>Heim</div>
                    <div>Gast</div>
                    <div>Sätze Heim</div>
                    <div>Sätze Gast</div>
                </div>
            `;
            matchesContainer.appendChild(currentBlock);
        }

        const row = document.createElement('div');
        row.className = 'match-row';
        row.innerHTML = `
            <div><strong>#${gameNr}</strong></div>
            <div><span class="mobile-label">Heim:</span> <span id="label-heim-${gameNr}" class="dynamic-player">H${paarung[0]}</span></div>
            <div><span class="mobile-label">Gast:</span> <span id="label-gast-${gameNr}" class="dynamic-player">G${paarung[1]}</span></div>
            <div>
                <span class="mobile-label">Sätze H:</span>
                <div class="set-controls" id="heim-sets-${gameNr}">
                    <div class="set-box"></div>
                    <div class="set-box"></div>
                </div>
            </div>
            <div>
                <span class="mobile-label">Sätze G:</span>
                <div class="set-controls" id="gast-sets-${gameNr}">
                    <div class="set-box"></div>
                    <div class="set-box"></div>
                </div>
            </div>
        `;
        currentBlock.appendChild(row);

        if (gameNr % 4 === 0 && blockNr < 4) {
            const subRow = document.createElement('div');
            subRow.className = 'sub-row';
            subRow.innerHTML = `
                <div class="sub-group">
                    <label>Wechsel Heim nach Block ${blockNr}</label>
                    <div class="sub-twin-container">
                        <div class="compact-sub">
                            <select class="sub-heim-out-1 sub-trigger" data-block="${blockNr}">
                                <option value="">Raus</option>
                                <option value="1">H1</option>
                                <option value="2">H2</option>
                                <option value="3">H3</option>
                                <option value="4">H4</option>
                            </select>
                            <span>➡️</span>
                            <select class="sub-heim-in-1 sub-trigger" data-block="${blockNr}">
                                <option value="">Rein</option>
                                <option value="H5">H5</option>
                                <option value="H6">H6</option>
                            </select>
                        </div>
                        <div class="compact-sub">
                            <select class="sub-heim-out-2 sub-trigger" data-block="${blockNr}">
                                <option value="">Raus</option>
                                <option value="1">H1</option>
                                <option value="2">H2</option>
                                <option value="3">H3</option>
                                <option value="4">H4</option>
                            </select>
                            <span>➡️</span>
                            <select class="sub-heim-in-2 sub-trigger" data-block="${blockNr}">
                                <option value="">Rein</option>
                                <option value="H5">H5</option>
                                <option value="H6">H6</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="sub-group">
                    <label>Wechsel Gast nach Block ${blockNr}</label>
                    <div class="sub-twin-container">
                        <div class="compact-sub">
                            <select class="sub-gast-out-1 sub-trigger" data-block="${blockNr}">
                                <option value="">Raus</option>
                                <option value="1">G1</option>
                                <option value="2">G2</option>
                                <option value="3">G3</option>
                                <option value="4">G4</option>
                            </select>
                            <span>➡️</span>
                            <select class="sub-gast-in-1 sub-trigger" data-block="${blockNr}">
                                <option value="">Rein</option>
                                <option value="G5">G5</option>
                                <option value="G6">G6</option>
                            </select>
                        </div>
                        <div class="compact-sub">
                            <select class="sub-gast-out-2 sub-trigger" data-block="${blockNr}">
                                <option value="">Raus</option>
                                <option value="1">G1</option>
                                <option value="2">G2</option>
                                <option value="3">G3</option>
                                <option value="4">G4</option>
                            </select>
                            <span>➡️</span>
                            <select class="sub-gast-in-2 sub-trigger" data-block="${blockNr}">
                                <option value="">Rein</option>
                                <option value="G5">G5</option>
                                <option value="G6">G6</option>
                            </select>
                        </div>
                    </div>
                </div>
            `;
            currentBlock.appendChild(subRow);
        }
    });

    function calculateTotals() {
        let totalHeimSets = 0;
        let totalGastSets = 0;
        let totalHeimGames = 0;
        let totalGastGames = 0;
        
        for(let i = 1; i <= 16; i++) {
            let heimSets = document.querySelectorAll(`#heim-sets-${i} .set-box.active`).length;
            let gastSets = document.querySelectorAll(`#gast-sets-${i} .set-box.active`).length;
            
            totalHeimSets += heimSets;
            totalGastSets += gastSets;
            
            if (heimSets === 2) {
                totalHeimGames++;
            }
            if (gastSets === 2) {
                totalGastGames++;
            }
        }
        
        document.getElementById('gewinnsaetzeHeim').value = totalHeimSets;
        document.getElementById('gewinnsaetzeGast').value = totalGastSets;
        document.getElementById('spielergebnisHeim').value = totalHeimGames;
        document.getElementById('spielergebnisGast').value = totalGastGames;
    }

    document.getElementById('matchesContainer').addEventListener('click', function(e) {
        if (e.target.classList.contains('set-box')) {
            e.target.classList.toggle('active');
            calculateTotals();
        }
    });

    function updateMatches() {
        let heimSlots = { 1: 'H1', 2: 'H2', 3: 'H3', 4: 'H4' };
        let gastSlots = { 1: 'G1', 2: 'G2', 3: 'G3', 4: 'G4' };

        for (let b = 1; b <= 4; b++) {
            let startIndex = (b - 1) * 4;
            if (b > 1) { 
                let prevBlock = b - 1;
                
                let hOut1 = document.querySelector(`.sub-heim-out-1[data-block="${prevBlock}"]`).value;
                let hIn1 = document.querySelector(`.sub-heim-in-1[data-block="${prevBlock}"]`).value;
                if (hOut1 && hIn1) heimSlots[parseInt(hOut1)] = hIn1;
                
                let hOut2 = document.querySelector(`.sub-heim-out-2[data-block="${prevBlock}"]`).value;
                let hIn2 = document.querySelector(`.sub-heim-in-2[data-block="${prevBlock}"]`).value;
                if (hOut2 && hIn2) heimSlots[parseInt(hOut2)] = hIn2;

                let gOut1 = document.querySelector(`.sub-gast-out-1[data-block="${prevBlock}"]`).value;
                let gIn1 = document.querySelector(`.sub-gast-in-1[data-block="${prevBlock}"]`).value;
                if (gOut1 && gIn1) gastSlots[parseInt(gOut1)] = gIn1;
                
                let gOut2 = document.querySelector(`.sub-gast-out-2[data-block="${prevBlock}"]`).value;
                let gIn2 = document.querySelector(`.sub-gast-in-2[data-block="${prevBlock}"]`).value;
                if (gOut2 && gIn2) gastSlots[parseInt(gOut2)] = gIn2;
            }

            for(let i = 0; i < 4; i++) {
                let gameIdx = startIndex + i;
                let hSlot = basePairings[gameIdx][0]; 
                let gSlot = basePairings[gameIdx][1]; 
                
                let currentH = heimSlots[hSlot]; 
                let currentG = gastSlots[gSlot]; 

                let hIndex = currentH.substring(1);
                let gIndex = currentG.substring(1);

                let hInput = document.querySelector(`.player-name-h[data-idx="${hIndex}"]`);
                let gInput = document.querySelector(`.player-name-g[data-idx="${gIndex}"]`);

                let hName = hInput ? hInput.value.trim() : '';
                let gName = gInput ? gInput.value.trim() : '';

                let hNameDisplay = hName ? `<span class="player-name-display">(${hName})</span>` : '';
                let gNameDisplay = gName ? `<span class="player-name-display">(${gName})</span>` : '';

                document.getElementById(`label-heim-${gameIdx+1}`).innerHTML = `${currentH} ${hNameDisplay}`;
                document.getElementById(`label-gast-${gameIdx+1}`).innerHTML = `${currentG} ${gNameDisplay}`;
            }
        }
    }

    // Event Delegation für dynamisch erstellte Roster Felder
    ['heimRoster', 'gastRoster'].forEach(id => {
        const el = document.getElementById(id);
        el.addEventListener('change', function(e) {
            if(e.target.classList.contains('player-name-h') || e.target.classList.contains('player-name-g')) updateMatches();
        });
        el.addEventListener('input', function(e) {
            if(e.target.classList.contains('player-name-h') || e.target.classList.contains('player-name-g')) updateMatches();
        });
    });

    document.querySelectorAll('.sub-trigger').forEach(select => {
        select.addEventListener('change', updateMatches);
    });

    // --- Logik für den Schwarzen Ring (Robuste Version für Heim UND Gast) ---
    const openModalBtn = document.getElementById('openModalBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const blackRingModal = document.getElementById('blackRingModal');
    const blackRingList = document.getElementById('blackRingList');
    const currentPenaltyDisplay = document.getElementById('currentPenaltyDisplay');
    const heimTeamInput = document.getElementById('heimTeam');
    const gastTeamInput = document.getElementById('gastTeam');
    
    // Beide Mannschaften werden fest gespeichert, damit kein Zähler aus Versehen gelöscht wird
    let penalties = {
        h: [0, 0, 0, 0, 0, 0],
        g: [0, 0, 0, 0, 0, 0]
    };

    function updateTeamNameAuto() {
        const isHeim = document.querySelector('input[name="teamRolle"]:checked').value === 'Heim';
        if (isHeim) {
            heimTeamInput.value = MEIN_VEREIN;
            if (gastTeamInput.value === MEIN_VEREIN) gastTeamInput.value = '';
            buildCaptain('h', true);
            buildCaptain('g', false);
            buildRoster('h', true);
            buildRoster('g', false);
        } else {
            gastTeamInput.value = MEIN_VEREIN;
            if (heimTeamInput.value === MEIN_VEREIN) heimTeamInput.value = '';
            buildCaptain('h', false);
            buildCaptain('g', true);
            buildRoster('h', false);
            buildRoster('g', true);
        }
        updateMatches();
    }

    // Wenn gewechselt wird, wird der Name angepasst, aber die Zähler BLEIBEN erhalten
    document.querySelectorAll('input[name="teamRolle"]').forEach(radio => {
        radio.addEventListener('change', updateTeamNameAuto);
    });

    // Initiales Setup
    updateTeamNameAuto();

    function renderModal() {
        blackRingList.innerHTML = '';
        
        let rawStrafe = strafeInput.value.toString().replace(',', '.');
        let parsedStrafe = parseFloat(rawStrafe) || 0;
        currentPenaltyDisplay.textContent = parsedStrafe.toFixed(2).replace('.', ',');
        
        const isHeim = document.querySelector('input[name="teamRolle"]:checked').value === 'Heim';
        const prefix = isHeim ? 'h' : 'g';
        const letter = isHeim ? 'H' : 'G';
        
        for(let i = 1; i <= 6; i++) {
            // Live-Abfrage des Namens im Moment des Öffnens
            let inputEl = document.querySelector(`.player-name-${prefix}[data-idx="${i}"]`);
            let playerName = inputEl ? inputEl.value.trim() : '';
            
            // Wenn kein Name eingetragen ist, falle auf H1/G1 zurück
            if(!playerName) playerName = `${letter}${i}`;
            
            const row = document.createElement('div');
            row.className = 'counter-row';
            row.innerHTML = `
                <span class="counter-name">${playerName}</span>
                <div class="counter-controls">
                    <button type="button" class="counter-btn minus" onclick="updateCount('${prefix}', ${i-1}, -1)">-</button>
                    <span class="counter-val" id="count-val-${prefix}-${i-1}">${penalties[prefix][i-1]}</span>
                    <button type="button" class="counter-btn" onclick="updateCount('${prefix}', ${i-1}, 1)">+</button>
                </div>
            `;
            blackRingList.appendChild(row);
        }
    }

    window.updateCount = function(prefix, index, change) {
        let newCount = penalties[prefix][index] + change;
        if (newCount < 0) newCount = 0; 
        penalties[prefix][index] = newCount;
        document.getElementById(`count-val-${prefix}-${index}`).textContent = newCount;
    }

    openModalBtn.addEventListener('click', () => {
        renderModal();
        blackRingModal.style.display = 'flex';
    });

    closeModalBtn.addEventListener('click', () => {
        blackRingModal.style.display = 'none';
    });

    // --- Formular absenden ---
    document.getElementById('dartForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        const statusMsg = document.getElementById('statusMessage');
        
        submitBtn.disabled = true;
        submitBtn.textContent = 'Speichere...';
        statusMsg.style.display = 'none';

        const mannschaftHeim = [];
        for(let i = 1; i <= 6; i++) {
            mannschaftHeim.push({
                pos: `H${i}`,
                name: document.querySelector(`.player-name-h[data-idx="${i}"]`).value,
                pass: document.querySelector(`.player-pass-h[data-idx="${i}"]`).value
            });
        }

        const mannschaftGast = [];
        for(let i = 1; i <= 6; i++) {
            mannschaftGast.push({
                pos: `G${i}`,
                name: document.querySelector(`.player-name-g[data-idx="${i}"]`).value,
                pass: document.querySelector(`.player-pass-g[data-idx="${i}"]`).value
            });
        }

        const spiele = {};
        for(let i = 1; i <= 16; i++) {
            spiele[`spiel_${i}`] = {
                heim_spieler: document.getElementById(`label-heim-${i}`).textContent.trim(),
                gast_spieler: document.getElementById(`label-gast-${i}`).textContent.trim(),
                heim_saetze: document.querySelectorAll(`#heim-sets-${i} .set-box.active`).length,
                gast_saetze: document.querySelectorAll(`#gast-sets-${i} .set-box.active`).length
            };
        }

        const auswechslungen = {};
        for(let i = 1; i <= 3; i++) {
            auswechslungen[`nach_block_${i}`] = {
                heim_1: {
                    raus: document.querySelector(`.sub-heim-out-1[data-block="${i}"]`).value,
                    rein: document.querySelector(`.sub-heim-in-1[data-block="${i}"]`).value
                },
                heim_2: {
                    raus: document.querySelector(`.sub-heim-out-2[data-block="${i}"]`).value,
                    rein: document.querySelector(`.sub-heim-in-2[data-block="${i}"]`).value
                },
                gast_1: {
                    raus: document.querySelector(`.sub-gast-out-1[data-block="${i}"]`).value,
                    rein: document.querySelector(`.sub-gast-in-1[data-block="${i}"]`).value
                },
                gast_2: {
                    raus: document.querySelector(`.sub-gast-out-2[data-block="${i}"]`).value,
                    rein: document.querySelector(`.sub-gast-in-2[data-block="${i}"]`).value
                }
            };
        }

        const teamRolle = document.querySelector('input[name="teamRolle"]:checked').value;
        
        let rawStrafe = strafeInput.value.toString().replace(',', '.');
        const strafeWert = parseFloat(rawStrafe) || 0;
        const schwarzerRingDaten = [];
        
        // Beide Mannschaftsseiten (H und G) nach Strafen absuchen, um nichts zu übersehen
        ['h', 'g'].forEach(prefix => {
            let letter = prefix === 'h' ? 'H' : 'G';
            for(let i = 1; i <= 6; i++) {
                const count = penalties[prefix][i-1];
                if (count > 0) {
                    let inputEl = document.querySelector(`.player-name-${prefix}[data-idx="${i}"]`);
                    let playerName = inputEl ? inputEl.value.trim() : '';
                    if(!playerName) playerName = `${letter}${i}`;
                    
                    schwarzerRingDaten.push({
                        pos: `${letter}${i}`,
                        name: playerName,
                        anzahl: count,
                        betrag: (count * strafeWert).toFixed(2)
                    });
                }
            }
        });

        const payload = {
            teamRolle: teamRolle,
            datum: document.getElementById('datum').value,
            liga: document.getElementById('liga').value,
            spielnr: document.getElementById('spielnr').value,
            disziplin: document.getElementById('disziplin').value,
            strafeProWurf: strafeWert,
            heimTeam: document.getElementById('heimTeam').value,
            gastTeam: document.getElementById('gastTeam').value,
            kapitaenHeim: document.getElementById('kapitaenHeim').value,
            kapitaenGast: document.getElementById('kapitaenGast').value,
            mannschaftHeim: mannschaftHeim,
            mannschaftGast: mannschaftGast,
            spiele: spiele,
            auswechslungen: auswechslungen,
            spielergebnisHeim: document.getElementById('spielergebnisHeim').value,
            spielergebnisGast: document.getElementById('spielergebnisGast').value,
            gewinnsaetzeHeim: document.getElementById('gewinnsaetzeHeim').value,
            gewinnsaetzeGast: document.getElementById('gewinnsaetzeGast').value,
            bestleistungen: {
                highScore: document.getElementById('highScore').value,
                highFinish: document.getElementById('highFinish').value,
                shortGame: document.getElementById('shortGame').value,
                bullEye: document.getElementById('bullEye').value,
                bemerkungen: document.getElementById('bemerkungen').value
            },
            strafkasse: schwarzerRingDaten
        };

        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload),
                headers: {
                    'Content-Type': 'text/plain;charset=utf-8',
                }
            });

            statusMsg.textContent = 'Erfolgreich gesendet! (Bitte zur Sicherheit in der Tabelle prüfen)';
            statusMsg.className = 'status-msg success';
            
            document.getElementById('dartForm').reset();
            document.querySelectorAll('.set-box.active').forEach(box => box.classList.remove('active'));
            updateTeamNameAuto(); // Reset stellt auch Checkboxen zurück, daher alles wieder passend aufbauen
            calculateTotals(); 
            
            // Strafen und Zähler nach Erfolg komplett auf null setzen
            strafeInput.value = "0.20";
            penalties = { h: [0,0,0,0,0,0], g: [0,0,0,0,0,0] };
            
        } catch (error) {
            statusMsg.textContent = 'Netzwerkfehler beim Speichern: ' + error.message;
            statusMsg.className = 'status-msg error';
        } finally {
            statusMsg.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Spielbericht speichern';
        }
    });
</script>
</body>
</html>
